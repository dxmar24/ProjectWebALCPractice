services:
  - type: web
    name: projectwebalcpractice-api
    runtime: docker
    plan: free
    dockerfilePath: ./06Code/Dockerfile
    dockerContext: ./06Code
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_TIMEZONE
        value: America/Bogota
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        value: postgres
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: FRONTEND_ORIGINS
        value: https://projectwebalcpractice-frontend.onrender.com,http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:5500,http://localhost:5500
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_AUTO_REGISTER_ROLE
        value: director
      - key: GOOGLE_AUTO_REGISTER_BRANCH_ID
        value: 1

  - type: web
    name: projectwebalcpractice-frontend
    runtime: static
    buildCommand: sh 06Code/View/render-build.sh
    staticPublishPath: ./06Code/View
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: true
      - key: API_BASE_URL
        value: https://projectwebalcpractice-api.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /dashboard
        destination: /dashboard.html
      - type: rewrite
        source: /dashboard/*
        destination: /dashboard.html
      - type: rewrite
        source: /session-ended
        destination: /session-ended.html
