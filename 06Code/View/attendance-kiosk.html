<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Attendance Station | American Latin Class</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="station-body">
  <main class="station-layout">
    <section class="station-panel">
      <a class="alc-brand mb-4" href="index.html" aria-label="American Latin Class">
        <span class="alc-brand-mark">ALC</span>
        <span>
          <strong>American Latin Class</strong>
          <small>Teacher station</small>
        </span>
      </a>
      <p class="eyebrow">School computer</p>
      <h1>Teacher check-in</h1>
      <p class="muted">This station is for teacher arrival time only. Student attendance is managed from the teacher portal.</p>

      <form class="form-grid" id="teacherKioskForm">
        <label class="full">
          <span>Teacher email</span>
          <input id="teacherKioskEmail" class="form-control form-control-lg" type="email" placeholder="teacher@americanlatinclass.com" autocomplete="off" autocapitalize="none" spellcheck="false" required>
        </label>
        <label>
          <span>Branch</span>
          <select id="teacherKioskBranch" class="form-select form-select-lg"></select>
        </label>
        <label>
          <span>Expected start</span>
          <input id="teacherExpectedStart" class="form-control form-control-lg" type="time" value="18:00" required>
        </label>
        <label>
          <span>Class hours</span>
          <input id="teacherDurationHours" class="form-control form-control-lg" type="number" min="0.25" max="8" step="0.25" value="1" required>
        </label>
        <label>
          <span>Style</span>
          <select id="teacherKioskStyle" class="form-select form-select-lg">
            <option>Reggaeton</option>
            <option>Urban</option>
            <option>Hip hop</option>
            <option>Afro</option>
            <option>House</option>
            <option>Salsa</option>
            <option>Bachata</option>
            <option>Stage training</option>
          </select>
        </label>
        <button class="btn btn-warning btn-lg fw-bold full" type="submit">
          <i class="bi bi-check2-circle"></i>
          Register check-in
        </button>
        <p class="notice full" id="teacherKioskMessage" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script/config.js"></script>
  <script src="script/app.js?v=20260529-google-oauth"></script>
</body>
</html>
