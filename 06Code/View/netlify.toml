[build]
publish = "."

[[redirects]]
from = "/dashboard"
to = "/dashboard.html"
status = 200

[[redirects]]
from = "/dashboard/*"
to = "/dashboard.html"
status = 200

[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/script/*"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"
