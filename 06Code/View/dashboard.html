<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | American Latin Class</title>
  <base href="/">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="app-body">
  <nav class="navbar alc-navbar app-navbar sticky-top">
    <div class="container-fluid px-lg-4">
      <a class="navbar-brand alc-brand" href="index.html" aria-label="American Latin Class">
        <span class="alc-brand-mark">ALC</span>
        <span>
          <strong>American Latin Class</strong>
          <small id="sessionRole">School portal</small>
        </span>
      </a>
      <div class="d-flex align-items-center gap-2">
        <div class="session-profile" id="sessionProfile" aria-label="Current session">
          <div class="session-avatar" aria-hidden="true">
            <img id="sessionAvatarImage" alt="">
            <span id="sessionAvatarInitials">AL</span>
          </div>
          <div class="session-profile-text">
            <strong id="sessionHeaderName">Signed in</strong>
            <small id="sessionHeaderRole">School portal</small>
          </div>
        </div>
        <button class="btn btn-outline-light btn-sm" id="homeButton" type="button">
          <i class="bi bi-house"></i>
          Home
        </button>
        <button class="btn btn-warning btn-sm fw-bold" id="logoutButton" type="button">
          <i class="bi bi-box-arrow-right"></i>
          Sign out
        </button>
      </div>
    </div>
  </nav>

  <main class="dashboard-shell">
    <aside class="dashboard-sidebar">
      <p class="eyebrow">Session</p>
      <h1 id="dashboardTitle">Dashboard</h1>
      <p id="sessionName" class="muted"></p>
      <nav class="module-nav" id="moduleNav" aria-label="Dashboard modules"></nav>
    </aside>

    <section class="dashboard-content">
      <div class="dashboard-topline">
        <div>
          <p class="eyebrow">Workspace</p>
          <h2 id="moduleTitle">Overview</h2>
        </div>
        <label class="month-control">
          <span>Month</span>
          <input id="dashboardMonth" class="form-control" type="month">
        </label>
      </div>

      <div id="moduleHost" class="module-host"></div>
    </section>
  </main>

  <div class="modal fade" id="logoutModal" tabindex="-1" aria-labelledby="logoutModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content alc-modal-content">
        <div class="modal-body text-center py-4">
          <i class="bi bi-box-arrow-right fs-1 text-warning mb-2 d-block"></i>
          <h5 class="fw-bold mb-1" id="logoutModalLabel">Sign out</h5>
          <p class="text-secondary mb-3">Are you sure you want to sign out of your account?</p>
          <div class="d-flex gap-2 justify-content-center">
            <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-warning fw-bold px-4" id="logoutConfirm">Sign out</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script/config.js"></script>
  <script src="script/app.js?v=20260529-google-oauth"></script>
</body>
</html>
